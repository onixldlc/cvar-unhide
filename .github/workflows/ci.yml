name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-2019, ubuntu-22.04]
        game: [csgo, portal2]
        exclude:
          # No Linux binaries for portal2
          - os: ubuntu-22.04
            game: portal2

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    - name: Checkout hl2sdk
      run: |
        git config -f .gitmodules submodule.hl2sdk.branch ${{ matrix.game }}
        git submodule sync
        git submodule update --init --remote

    - name: Get version
      id: version
      shell: bash
      run: echo "version=$(date +%Y%m%d).${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Format game name
      uses: ASzc/change-string-case-action@v8
      id: game-name
      with:
        string: ${{ matrix.game }}

    - name: Write version.h
      shell: bash
      run: |
        echo '#define CVAR_UNHIDE_VERSION "${{ steps.version.outputs.version }}-${{ matrix.game }}"' > version.h
        echo '#define CVAR_UNHIDE_GAME_${{ steps.game-name.outputs.uppercase }}' >> version.h

    - name: Add MSBuild to PATH
      if: ${{ matrix.os == 'windows-2019' }}
      uses: microsoft/setup-msbuild@v2

    - name: Build plugin (Windows)
      if: ${{ matrix.os == 'windows-2019' }}
      run: msbuild /m /p:Configuration=Release cvar-unhide.sln

    - name: Build plugin (Linux)
      if: ${{ matrix.os == 'ubuntu-22.04' }}
      uses: docker://saulren/serverplugin-base:latest
      with:
        args: make plugin

    - name: Archive binaries
      uses: actions/upload-artifact@v4
      with:
        name: addons-${{ matrix.game }}-${{ matrix.os }}
        path: addons
        retention-days: 5

  deploy:
    needs: [build]
    if: github.ref == 'refs/heads/master'
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set environment variables
        run: |
          VERSION=${{ needs.build.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=v$VERSION" >> $GITHUB_ENV

      - uses: mukunku/tag-exists-action@v1.7.0
        id: checkTag
        with:
          tag: ${{ env.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push new tag
        if: ${{ steps.checkTag.outputs.exists == 'false' }}
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@users.noreply.github.com'
          git tag $TAG
          git push origin $TAG

      - name: Download artifacts
        if: ${{ steps.checkTag.outputs.exists == 'false' }}
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: ZIP artifacts
        if: ${{ steps.checkTag.outputs.exists == 'false' }}
        run: |
          for i in */; do rm addons || true; ln -s ${i%/} addons && zip -r "${i%/}.zip" addons; done
        working-directory: artifacts/

      - name: Create GitHub release
        if: ${{ steps.checkTag.outputs.exists == 'false' }}
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.TAG }}
