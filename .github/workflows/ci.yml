name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Least-privilege default; the deploy job opts in to write access.
permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.game }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # NOTE: Do not bump these blindly. Source Engine plugins need an old
        # toolchain (VS 2019 on Windows, older glibc on Linux) for ABI compat
        # with the game binaries.
        os: [windows-2019, ubuntu-22.04]
        game: [csgo, portal2]
        exclude:
          # Upstream hl2sdk has no Linux libs for Portal 2
          - os: ubuntu-22.04
            game: portal2
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Point hl2sdk submodule at the ${{ matrix.game }} branch
        shell: bash
        run: |
          git config -f .gitmodules submodule.hl2sdk.branch '${{ matrix.game }}'
          git submodule sync
          git submodule update --init --remote

      - name: Compute version
        id: version
        shell: bash
        run: |
          VERSION="$(date -u +%Y%m%d).${{ github.run_number }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Write version.h
        shell: bash
        run: |
          GAME_UPPER="$(echo '${{ matrix.game }}' | tr '[:lower:]' '[:upper:]')"
          {
            echo "#define CVAR_UNHIDE_VERSION \"${{ steps.version.outputs.version }}-${{ matrix.game }}\""
            echo "#define CVAR_UNHIDE_GAME_${GAME_UPPER}"
          } > version.h
          cat version.h

      # ---- Windows build ----
      - name: Set up MSBuild
        if: matrix.os == 'windows-2019'
        uses: microsoft/setup-msbuild@v2

      - name: Build plugin (Windows)
        if: matrix.os == 'windows-2019'
        run: msbuild /m /p:Configuration=Release cvar-unhide.sln

      # ---- Linux build ----
      - name: Fetch lib32gcc-s1 from Ubuntu archive
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update -q
          apt-get download lib32gcc-s1
          dpkg-deb -x lib32gcc-s1*.deb ./_libgcc
          cp ./_libgcc/usr/lib32/libgcc_s.so.1 ./libgcc_s.so.1
          sha256sum ./libgcc_s.so.1
          rm -rf ./_libgcc lib32gcc-s1*.deb

      - name: Build plugin (Linux)
        if: matrix.os == 'ubuntu-22.04'
        # SUPPLY-CHAIN NOTE: This image lives on a personal Docker Hub account
        # and is pulled by floating tag. To harden, replace ":latest" with a
        # pinned digest:
        #   uses: docker://saulren/serverplugin-base@sha256:<digest>
        # Or build your own base image inside this repo and reference it.
        uses: docker://saulren/serverplugin-base:latest
        with:
          args: make plugin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: addons-${{ matrix.game }}-${{ matrix.os }}
          path: addons
          retention-days: 5

  deploy:
    name: Deploy release
    needs: build
    # Only auto-deploy on actual pushes/dispatches against master,
    # never on PRs (their ref is refs/pull/N/merge, not refs/heads/master).
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push tags + create releases
    env:
      VERSION: ${{ needs.build.outputs.version }}
      TAG: v${{ needs.build.outputs.version }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether tag already exists
        id: check_tag
        shell: bash
        run: |
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists - skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Download all build artifacts
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package each artifact into a zip
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        working-directory: artifacts
        run: |
          # Each downloaded artifact is its own subdirectory. We symlink it as
          # "addons" so the resulting zip contains the expected addons/ root.
          shopt -s nullglob
          for dir in */; do
            name="${dir%/}"
            rm -rf addons
            ln -s "${name}" addons
            zip -r "${name}.zip" addons
          done
          rm -f addons

      - name: Create GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${TAG}" artifacts/*.zip \
            --title "${TAG}" \
            --notes "Automated build for version ${VERSION} (run #${{ github.run_number }})."
